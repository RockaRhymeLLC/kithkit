<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skippy API Metrics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      line-height: 1.5;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .snapshot-notice {
      display: inline-block;
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--accent);
    }
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .card .value.green { color: var(--green); }
    .card .value.red { color: var(--red); }
    .card .value.orange { color: var(--orange); }
    .card .value.accent { color: var(--accent); }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) {
      .chart-grid { grid-template-columns: 1fr; }
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-card canvas { max-height: 300px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: rgba(88, 166, 255, 0.04); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.error { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .badge.warn { background: rgba(210, 153, 34, 0.15); color: var(--orange); }
    .badge.ok { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .timestamp {
      font-size: 12px;
      color: var(--text-muted);
    }
    .error-msg {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 16px;
      color: var(--red);
      margin-bottom: 24px;
    }
  </style>
</head>

  <div class="header">
    <div>
      <h1>Skippy API Metrics</h1>

    <div>

  <div class="summary-cards" id="summaryCards">

    <div class="card"><div class="label">4xx Errors</div><div class="value orange" id="errors4xx">-</div></div>

    <div class="card"><div class="label">Avg Latency</div><div class="value accent" id="avgLatency">-</div></div>

  <div class="chart-grid">
    <div class="chart-card full">
      <h2>Request Volume & Errors Over Time</h2>

    </div>
    <div class="chart-card">
      <h2>Latency Over Time</h2>
      <canvas id="latencyChart"></canvas>
    </div>
    <div class="chart-card">
      <h2>Requests by Agent</h2>
      <canvas id="agentChart"></canvas>
    </div>
  </div>

  <div class="chart-grid">
    <div class="chart-card">
      <h2>Top Endpoints</h2>
      <div id="endpointTable"></div>
    </div>
    <div class="chart-card">
      <h2>Top Errors</h2>
      <div id="errorsTable"></div>
    </div>
  </div>

  <div class="chart-grid" id="repeatSection" style="display:none;">
    <div class="chart-card full">
      <h2>Repeat Offenders</h2>
      <div id="repeatTable"></div>
    </div>
  </div>

    window.__SYNC_TIMESTAMP__ = "2026-03-03T02:14:10.432Z";

    const chartDefaults = {
      color: '#8b949e',
      borderColor: '#30363d',
    };

    Chart.defaults.color = chartDefaults.color;
    Chart.defaults.borderColor = chartDefaults.borderColor;

    function formatNum(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    function formatMs(ms) {
      if (ms >= 1000) return (ms / 1000).toFixed(1) + 's';
      return Math.round(ms) + 'ms';
    }

    function formatHour(h) {
      try {
        const d = new Date(h.replace(' ', 'T') + ':00Z');
        return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch {
        return h;
      }
    }

    function buildTable(headers, rows) {
      if (rows.length === 0) return '<p style="color:var(--text-muted);padding:12px;">No data</p>';
      let html = '<table><thead><tr>';
      for (const h of headers) html += '<th>' + h.label + '</th>';
      html += '</tr></thead><tbody>';
      for (const row of rows) {
        html += '<tr>';
        for (const h of headers) html += '<td>' + h.render(row) + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      return html;
    }

    function renderDashboard() {
      const data = window.__METRICS_DATA__;
      if (!data) return;

      // Show sync timestamp
      const syncTime = new Date(window.__SYNC_TIMESTAMP__);
      const dataTime = data.timestamp ? new Date(data.timestamp) : syncTime;
      document.getElementById('lastUpdated').textContent =
        'Last synced: ' + syncTime.toLocaleString() + ' | Data as of: ' + dataTime.toLocaleString();

      // Summary cards
      const s = data.summary;
      document.getElementById('totalReqs').textContent = formatNum(s.total_requests);
      const rate = s.total_requests > 0 ? ((s.success_count / s.total_requests) * 100).toFixed(1) : '0.0';
      document.getElementById('successRate').textContent = rate + '%';
      document.getElementById('errors4xx').textContent = formatNum(s.error_4xx);
      document.getElementById('errors5xx').textContent = formatNum(s.error_5xx);
      document.getElementById('avgLatency').textContent = formatMs(s.avg_latency_ms);

      // Volume chart
      const hourly = data.hourly || [];
      const labels = hourly.map(function(h) { return formatHour(h.hour); });
      const err4Data = hourly.map(function(h) { return h.error_4xx; });
      const err5Data = hourly.map(function(h) { return h.error_5xx; });

      new Chart(document.getElementById('volumeChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Successful',
              data: hourly.map(function(h) { return h.success_count; }),
              backgroundColor: 'rgba(63, 185, 80, 0.6)',
              borderRadius: 2,
            },
            {
              label: '4xx Errors',
              data: err4Data,
              backgroundColor: 'rgba(210, 153, 34, 0.6)',
              borderRadius: 2,
            },
            {
              label: '5xx Errors',
              data: err5Data,
              backgroundColor: 'rgba(248, 81, 73, 0.6)',
              borderRadius: 2,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: {
            x: { stacked: true, ticks: { maxRotation: 45, font: { size: 10 } } },
            y: { stacked: true, beginAtZero: true },
          },
        },
      });

      // Latency chart
      var latData = hourly.map(function(h) { return h.avg_latency_ms; });

      new Chart(document.getElementById('latencyChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Avg Latency (ms)',
            data: latData,
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88, 166, 255, 0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { maxRotation: 45, font: { size: 10 } } },
            y: { beginAtZero: true, title: { display: true, text: 'ms' } },
          },
        },
      });

      // Agent chart
      var agents = data.agents || [];
      if (agents.length > 0) {
        var colors = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#f0883e', '#79c0ff'];
        new Chart(document.getElementById('agentChart'), {
          type: 'doughnut',
          data: {
            labels: agents.map(function(a) { return a.agent_id; }),
            datasets: [{
              data: agents.map(function(a) { return a.total_requests; }),
              backgroundColor: agents.map(function(_, i) { return colors[i % colors.length]; }),
              borderWidth: 0,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'right', labels: { font: { size: 11 } } },
            },
          },
        });
      }

      // Endpoint table
      var endpoints = (data.endpoints || []).slice(0, 15);
      document.getElementById('endpointTable').innerHTML = buildTable(
        [
          { label: 'Endpoint', render: function(r) { return '<code>' + r.method + ' ' + r.endpoint + '</code>'; } },
          { label: 'Requests', render: function(r) { return formatNum(r.total_requests); } },
          { label: '4xx', render: function(r) { return r.error_4xx > 0 ? '<span class="badge warn">' + r.error_4xx + '</span>' : '-'; } },
          { label: '5xx', render: function(r) { return r.error_5xx > 0 ? '<span class="badge error">' + r.error_5xx + '</span>' : '-'; } },
          { label: 'Avg', render: function(r) { return formatMs(r.avg_latency_ms); } },
          { label: 'p95', render: function(r) { return formatMs(r.p95_latency_ms); } },
        ],
        endpoints,
      );

      // Errors table
      var topErrors = (data.top_errors || []).slice(0, 10);
      document.getElementById('errorsTable').innerHTML = buildTable(
        [
          { label: 'Endpoint', render: function(r) { return '<code>' + r.method + ' ' + r.endpoint + '</code>'; } },
          { label: 'Errors', render: function(r) { return '<span class="badge error">' + r.total_errors + '</span>'; } },
        ],
        topErrors,
      );

      // Repeat offenders
      var repeats = data.repeat_offenders || [];
      if (repeats.length > 0) {
        document.getElementById('repeatSection').style.display = '';
        document.getElementById('repeatTable').innerHTML = buildTable(
          [
            { label: 'Agent', render: function(r) { return '<code>' + r.agent_id + '</code>'; } },
            { label: 'Endpoint', render: function(r) { return '<code>' + r.method + ' ' + r.endpoint + '</code>'; } },
            { label: 'Errors', render: function(r) { return '<span class="badge error">' + r.error_count + '</span>'; } },
            { label: 'Latest', render: function(r) { return formatHour(r.latest_hour); } },
          ],
          repeats,
        );
      }
    }

    renderDashboard();
  </script>
