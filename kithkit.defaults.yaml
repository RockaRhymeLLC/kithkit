# Kithkit — Default configuration
# These defaults are deep-merged with your kithkit.config.yaml.
# Override any value in your config file; unset values use these defaults.

agent:
  name: Assistant

daemon:
  port: 3847
  log_level: info
  log_dir: logs
  lan:
    enabled: false
    bind_host: "0.0.0.0"
    port: 3848
  log_rotation:
    max_size_mb: 10
    max_files: 5

scheduler:
  tasks_dirs: []          # Additional directories to scan for external task handler files
  tasks:
    - name: context-watchdog
      interval: "3m"
      enabled: true
      config:
        requires_session: true

    - name: todo-reminder
      interval: "30m"
      enabled: true
      config:
        requires_session: false

    - name: approval-audit
      cron: "0 9 1 * *"  # 1st of month, 9am
      enabled: true
      config:
        requires_session: true

    - name: backup
      cron: "0 3 * * 0"  # Sunday 3am
      enabled: true
      config:
        requires_session: false

    - name: orchestrator-idle
      interval: "2m"
      enabled: true
      config:
        idle_timeout_minutes: 10

    - name: message-delivery
      interval: "10s"
      enabled: true
      config:
        requires_session: true

    - name: api-metrics-aggregation
      interval: "1h"
      enabled: true
      config:
        requires_session: false

security:
  rate_limits:
    incoming_max_per_minute: 5
    outgoing_max_per_minute: 10
