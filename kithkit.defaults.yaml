# Kithkit — Default configuration
# These defaults are deep-merged with your kithkit.config.yaml.
# Override any value in your config file; unset values use these defaults.

agent:
  name: Assistant

claude:
  skip_permissions: false    # Set true to always pass --dangerously-skip-permissions

daemon:
  port: 3847
  bind_host: "127.0.0.1"
  log_level: info
  log_dir: logs
  # db_path: "~/Library/Application Support/kithkit/kithkit.db"
  # Database file location. If omitted, uses the platform default:
  #   macOS  → ~/Library/Application Support/kithkit/kithkit.db
  #   Linux  → $XDG_DATA_HOME/kithkit/kithkit.db  (fallback: ~/.local/share/kithkit/kithkit.db)
  #   Other  → ~/.kithkit/data/kithkit.db
  # Supports ~ expansion. Relative paths resolve from projectDir (not recommended).
  # Changing db_path requires a daemon restart — hot-reload is rejected.
  lan:
    enabled: false
    bind_host: "127.0.0.1"
    port: 3848
  self_watchdog:
    enabled: true
    idle_threshold_seconds:
      warn_seconds: 21600    # 6 hours
      alert_seconds: 43200   # 12 hours
    dedup_window_seconds: 3600  # 1 hour
    # a2a_group: "your-group-id-or-name"  # Optional — broadcast alerts to this A2A group. Omit to skip A2A channel.
  log_rotation:
    max_size_mb: 10
    max_files: 5

scheduler:
  tasks_dirs: []          # Additional directories to scan for external task handler files
  tasks:
    - name: context-watchdog
      interval: "3m"
      enabled: true
      config:
        requires_session: true

    - name: todo-reminder
      interval: "30m"
      enabled: true
      config:
        requires_session: false

    - name: approval-audit
      cron: "0 9 1 * *"  # 1st of month, 9am
      enabled: true
      config:
        requires_session: true

    - name: backup
      cron: "0 3 * * 0"  # Sunday 3am
      enabled: true
      config:
        requires_session: false

    - name: orchestrator-idle
      interval: "2m"
      enabled: true
      config:
        idle_timeout_minutes: 10

    - name: message-delivery
      interval: "10s"
      enabled: true
      config:
        requires_session: true

    - name: api-metrics-aggregation
      interval: "1h"
      enabled: true
      config:
        requires_session: false

    - name: "comms-heartbeat"
      enabled: true
      interval: "60s"

    - name: "orch-stale-task-recovery"
      enabled: true
      interval: "5m"
      config:
        # How long (ms) an 'assigned' task may sit without an update before it is
        # considered stale. Default: 30 minutes (1_800_000 ms).
        stale_assigned_ms: 1800000
        # How long (ms) an 'in_progress' task may sit without an update before it
        # is considered stale. Default: 60 minutes (3_600_000 ms).
        stale_in_progress_ms: 3600000

    - name: self-watchdog
      interval: "5m"
      enabled: true
      config:
        requires_session: false

    - name: kkit-reflection
      cron: "0 3 * * *"
      enabled: false
      config:
        dry_run: true
        lookback_hours: 24
        max_memories_per_run: 100
        batch_size: 20
        max_deletes_per_run: 10
        enabled_actions:
          - skill-update
          - memory-keep
          - memory-consolidate
          - memory-expire
          - todo-create
        pattern_detection:
          enabled: true
          window_days: 7
          threshold: 3
        skill_mapping:
          api-format: daemon-api
          behavioral: null
          process: null
          tool-usage: null
          communication: null

orchestrator:
  plan_review_sla_minutes: 10

caps:
  # Firewall against runaway agents — not an efficiency throttle (Dave 2026-05-12).
  # All values are 5× the original hardcoded floors.
  # Override any value in kithkit.config.yaml.
  warning_threshold_pct: 80         # Worker B will wire: warn agent at this % of maxTurns used
  inactivity_timeout_ms: 1500000    # Worker killed after this ms of no output (was 300000 / 5 min)
  default_max_turns: 100            # Fallback for profiles with no caps.profiles entry (was 20)
  profiles:
    orchestrator:    { max_turns: 1000 }  # was 200
    coding:          { max_turns: 500 }   # was 100
    research:        { max_turns: 250 }   # was 50
    review:          { max_turns: 250 }   # was 50
    memory-worker:   { max_turns: 200 }   # was 40
    docs:            { max_turns: 200 }   # was 40
    testing:         { max_turns: 150 }   # was 30 (.claude/agents) / 15 (profiles/)
    retro:           { max_turns: 75 }    # was 15
    email:           { max_turns: 50 }    # was 10
    devils-advocate: { max_turns: 75 }    # was 15

security:
  rate_limits:
    incoming_max_per_minute: 5
    outgoing_max_per_minute: 10

self_improvement:
  enabled: false
  retro:
    enabled: false
    triggers:
      on_error: true
      on_correction: true
      on_retry: true
    max_learnings_per_retro: 5
    retro_all_terminal: false   # When true, spawn a retro worker for every terminal task
  transcript_review:
    enabled: false
    interval_actions: 25
    interval_minutes: 30
    max_learnings_per_review: 3
  correction_trigger:
    enabled: false
  pre_task_injection:
    enabled: false
    max_memories_injected: 10
    min_relevance_score: 0.4
  memory_sync:
    enabled: false
    peers: []
  lifecycle:
    consolidation_threshold: 0.85
    category_cap: 50
    decay:
      default: "30d"
      short: "7d"
      evergreen: "never"
