# Notify Instances — dispatches sync events to personal repos after main updates.
# Each personal repo has an upstream-sync workflow that listens for these events.
# Instance repo names are stored in the INSTANCE_REPOS repository variable as a
# JSON array, e.g. '["RockaRhymeLLC/KKit-A","RockaRhymeLLC/KKit-B"]'.
name: Notify Instances

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  notify-downstream:
    runs-on: ubuntu-latest
    # Only dispatch on actual pushes, not PR merges that re-trigger
    if: github.event_name == 'push'
    strategy:
      matrix:
        repo: ${{ fromJSON(vars.INSTANCE_REPOS) }}
      fail-fast: false

    steps:
      - name: Notify instance
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INSTANCE_SYNC_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: upstream-sync
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "repository": "${{ github.repository }}",
              "sender": "${{ github.actor }}"
            }
