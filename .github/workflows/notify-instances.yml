# Notify Instances — dispatches sync events to personal repos after main updates.
# Each personal repo has an upstream-sync workflow that listens for these events.
name: Notify Instances

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  notify-downstream:
    runs-on: ubuntu-latest
    # Only dispatch on actual pushes, not PR merges that re-trigger
    if: github.event_name == 'push'

    steps:
      - name: Notify KKit-INSTANCE-A
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INSTANCE_SYNC_TOKEN }}
          repository: RockaRhymeLLC/KKit-INSTANCE-A
          event-type: upstream-sync
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "repository": "${{ github.repository }}",
              "sender": "${{ github.actor }}"
            }

      - name: Notify KKit-INSTANCE-B
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INSTANCE_SYNC_TOKEN }}
          repository: RockaRhymeLLC/KKit-INSTANCE-B
          event-type: upstream-sync
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "repository": "${{ github.repository }}",
              "sender": "${{ github.actor }}"
            }

      - name: Notify KKit-INSTANCE-C
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INSTANCE_SYNC_TOKEN }}
          repository: RockaRhymeLLC/KKit-INSTANCE-C
          event-type: upstream-sync
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "repository": "${{ github.repository }}",
              "sender": "${{ github.actor }}"
            }
