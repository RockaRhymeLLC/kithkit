# Notify Instances — dispatches sync events to personal repos after main updates.
# Each personal repo has an upstream-sync workflow that listens for these events.
# Instance repo names are stored in the INSTANCE_REPOS repository variable as a
# JSON array, e.g. '["RockaRhymeLLC/KKit-A","RockaRhymeLLC/KKit-B"]'.
name: Notify Instances

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  config-check:
    runs-on: ubuntu-latest
    steps:
      - name: Warn if INSTANCE_REPOS is unset or empty
        if: vars.INSTANCE_REPOS == ''
        run: echo "::warning::INSTANCE_REPOS is unset/empty — fleet upstream-sync was NOT dispatched"

  notify-downstream:
    runs-on: ubuntu-latest
    # Only dispatch on actual pushes, not PR merges that re-trigger.
    # Skip entirely when INSTANCE_REPOS is unset — an empty matrix is a GHA
    # failure, not a no-op, so we must guard at the job level.
    if: github.event_name == 'push' && vars.INSTANCE_REPOS != ''
    strategy:
      matrix:
        repo: ${{ fromJSON(vars.INSTANCE_REPOS || '[]') }}
      fail-fast: false

    steps:
      - name: Notify instance
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INSTANCE_SYNC_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: upstream-sync
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "repository": "${{ github.repository }}",
              "sender": "${{ github.actor }}"
            }
