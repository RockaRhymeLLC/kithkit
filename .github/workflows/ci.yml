# CI — runs on every push and PR to main
# Tests, type-checking, and instance-specific content leak detection.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # The daemon depends on cc4me-network via a file: link that only
      # resolves locally. It's dynamically loaded at runtime, not imported
      # in source. Remove it before install so npm ci succeeds in CI.
      - name: Remove local-only file dependencies
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('daemon/package.json', 'utf8'));
            for (const [name, ver] of Object.entries(pkg.dependencies || {})) {
              if (typeof ver === 'string' && ver.startsWith('file:')) {
                console.log('Removing local dep:', name, ver);
                delete pkg.dependencies[name];
              }
            }
            fs.writeFileSync('daemon/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Type-check (daemon)
        working-directory: daemon
        run: npx tsc --noEmit

      - name: Type-check (cli)
        working-directory: cli
        run: npx tsc --noEmit

      # Tests are currently informational — 49 pre-existing failures need
      # fixing before tests can gate PRs. Track in a separate issue.
      - name: Test (daemon)
        working-directory: daemon
        run: npm test
        continue-on-error: true

      - name: Test (cli)
        working-directory: cli
        run: npm test
        continue-on-error: true

  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files for instance-specific content
        run: |
          # Blocked patterns — instance-specific identifiers that must not
          # be introduced to the public framework repo. Keep in sync with
          # scripts/install-hooks.sh (local pre-push hook).
          #
          # NOTE: "credential-" and "BMO" are intentionally EXCLUDED from
          # this list because they're already part of the framework:
          #   - credential- is the keychain naming convention
          #   - BMO references exist in channel-router, telegram adapter, etc.
          # Cleaning those up is tracked separately.
          PATTERNS='R2D2|Skippy|bmobot|daveh@|7629737488|192\.168\.12|com\.assistant\.bmo|com\.bmo\.|lindee|kp\.hurley'

          # Directories/files excluded from checking (documentation, examples)
          # install-hooks.sh defines these patterns — it must contain them by definition
          EXCLUDE='README\.md|SECURITY\.md|CONTRIBUTING\.md|templates/|\.github/|\.claude/skills/|docs/|install-hooks\.sh'

          # Get changed files — PR diff or push diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
<<<<<<< HEAD
            DIFF=$(git diff HEAD~1 -- . ':!*.yml' ':!*.md' 2>/dev/null || true)
=======
            # Push: compare against parent commit(s)
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
>>>>>>> upstream/main
          fi

          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD" 2>/dev/null || echo "")

          if [ -z "$CHANGED" ]; then
            echo "No changed files to check."
            exit 0
          fi

          # Filter to relevant file types and exclude safe directories
          FILES=$(echo "$CHANGED" | grep -E '\.(ts|js|yaml|yml|json|md|sh)$' | grep -v -E "$EXCLUDE" || true)

          if [ -z "$FILES" ]; then
            echo "No relevant changed files to check."
            exit 0
          fi

          echo "Checking $(echo "$FILES" | wc -l | tr -d ' ') changed files for instance-specific patterns..."

          FOUND=""
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            MATCHES=$(grep -nE "$PATTERNS" "$file" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FOUND="${FOUND}${file}:\n${MATCHES}\n\n"
            fi
          done <<< "$FILES"

          if [ -n "$FOUND" ]; then
            echo "::error::Instance-specific content detected in changed files:"
            echo -e "$FOUND"
            echo ""
            echo "These patterns must not appear in the public framework repo."
            echo "If this is a false positive, add the file to the EXCLUDE list in ci.yml."
            exit 1
          fi

          echo "Leak check passed — no instance-specific content in changed files."
