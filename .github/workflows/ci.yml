# CI — runs on every push and PR to main
# Tests, type-checking, and instance-specific content leak detection.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # The daemon depends on cc4me-network via a file: link that only
      # resolves locally. It's dynamically loaded at runtime, not imported
      # in source. Remove it before install so npm ci succeeds in CI.
      - name: Remove local-only file dependencies
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('daemon/package.json', 'utf8'));
            for (const [name, ver] of Object.entries(pkg.dependencies || {})) {
              if (typeof ver === 'string' && ver.startsWith('file:')) {
                console.log('Removing local dep:', name, ver);
                delete pkg.dependencies[name];
              }
            }
            fs.writeFileSync('daemon/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm install

      - name: Audit (CVE gate)
        run: npm run audit:check

      - name: Build
        run: npm run build

      - name: Check migration prefix collisions
        run: node scripts/check-migration-collisions.mjs

      - name: Type-check (daemon)
        working-directory: daemon
        run: npx tsc --noEmit

      - name: Type-check (cli)
        working-directory: cli
        run: npx tsc --noEmit

      # Tests remain informational here (continue-on-error) — there are
      # ~39-62 pre-existing env-dependent failures on main depending on
      # glob/invocation scope (see .kithkit/reports/ci-gating-failure-triage-
      # 2026-06-05.md, todo #1873/#2238) that are out of scope to fix in this
      # change. Actual gating happens in the test-delta-gate job below, which
      # fails the *workflow* iff a test fails on HEAD that did not already
      # fail on the PR's BASE ref — a straight continue-on-error:false flip
      # is not possible until the pre-existing failures are triaged (#2238).
      #
      # We run each test suite with TWO reporters simultaneously: `tap` to
      # stdout (unchanged human-readable log for local debugging) and `junit`
      # to a file (machine-parseable per-test names, consumed by
      # scripts/ci/list-test-failures.mjs). JUnit's flattened <testcase>
      # elements avoid the suite-parent "not ok" bubble-up that produced the
      # 57 vs 81 vs 147 count confusion in the triage report — we compare
      # test NAMES, never raw failure counts.
      - name: Test (daemon)
        working-directory: daemon
        run: |
          KITHKIT_SUPPRESS_NOTIFICATIONS=1 node --test --test-concurrency=1 \
            --test-reporter=tap --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=../daemon-test-results.xml \
            $(find dist -name '*.test.js' -not -path '*/node_modules/*' -not -name 'plan-approval.test.js')
        continue-on-error: true

      - name: Test (cli)
        working-directory: cli
        run: |
          node --test \
            --test-reporter=tap --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=../cli-test-results.xml \
            dist/__tests__/**/*.test.js
        continue-on-error: true

      - name: Extract failing test names (head)
        run: |
          node scripts/ci/list-test-failures.mjs daemon daemon-test-results.xml > head-daemon-failures.txt
          node scripts/ci/list-test-failures.mjs cli cli-test-results.xml > head-cli-failures.txt
          cat head-daemon-failures.txt head-cli-failures.txt | sort -u > head-test-failures.txt
          echo "HEAD failing tests ($(wc -l < head-test-failures.txt | tr -d ' ')):"
          cat head-test-failures.txt

      - uses: actions/upload-artifact@v4
        with:
          name: head-test-failures
          path: head-test-failures.txt

  # Runs the identical build+test steps against the PR's/push's BASE ref, in
  # parallel with build-and-test, so test-delta-gate can diff failing test
  # NAMES (head vs base) instead of comparing raw counts (which vary by
  # glob/env — see todo #1873, R2's documented 5-vs-3 and 39-vs-62
  # discrepancies). This is a live, per-run baseline: it is always computed
  # fresh from whatever main currently looks like, so there is nothing to
  # manually refresh — when a pre-existing failure is fixed on main, the very
  # next CI run automatically has a smaller tolerated set. No baseline
  # manifest file to maintain.
  test-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve base ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          # github.event.before is the all-zero SHA on a repo's very first
          # push (no parent commit to diff against). Guard so the job can't
          # hard-fail trying to check out a non-existent ref — fall back to
          # an empty baseline (every head failure is then treated as new).
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.resolve.outputs.valid == 'true'
        with:
          ref: ${{ steps.resolve.outputs.base_sha }}
          fetch-depth: 0

      # The delta-gate scripts themselves (scripts/ci/*.mjs) are part of
      # THIS change and may not exist yet on the base ref (e.g. the base
      # is main, before this PR merges) — checking out base_sha above can
      # leave scripts/ci missing or stale. Pull the current (head-ref)
      # copies into a side directory and overlay them, so extraction
      # always uses this run's gate logic regardless of what the base ref
      # contains.
      - uses: actions/checkout@v4
        if: steps.resolve.outputs.valid == 'true'
        with:
          path: .ci-scripts-head
          sparse-checkout: |
            scripts/ci
          sparse-checkout-cone-mode: false

      - name: Overlay current delta-gate scripts
        if: steps.resolve.outputs.valid == 'true'
        run: |
          mkdir -p scripts/ci
          cp .ci-scripts-head/scripts/ci/*.mjs scripts/ci/
          rm -rf .ci-scripts-head

      - uses: actions/setup-node@v4
        if: steps.resolve.outputs.valid == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Remove local-only file dependencies
        if: steps.resolve.outputs.valid == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('daemon/package.json', 'utf8'));
            for (const [name, ver] of Object.entries(pkg.dependencies || {})) {
              if (typeof ver === 'string' && ver.startsWith('file:')) {
                console.log('Removing local dep:', name, ver);
                delete pkg.dependencies[name];
              }
            }
            fs.writeFileSync('daemon/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        if: steps.resolve.outputs.valid == 'true'
        run: npm install

      - name: Build
        if: steps.resolve.outputs.valid == 'true'
        run: npm run build

      # No audit/migration-collision/type-check here — test-baseline only
      # needs to produce the base ref's failing-test names, not re-validate
      # things the build-and-test job already gates.
      - name: Test (daemon)
        if: steps.resolve.outputs.valid == 'true'
        working-directory: daemon
        run: |
          KITHKIT_SUPPRESS_NOTIFICATIONS=1 node --test --test-concurrency=1 \
            --test-reporter=tap --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=../daemon-test-results.xml \
            $(find dist -name '*.test.js' -not -path '*/node_modules/*' -not -name 'plan-approval.test.js')
        continue-on-error: true

      - name: Test (cli)
        if: steps.resolve.outputs.valid == 'true'
        working-directory: cli
        run: |
          node --test \
            --test-reporter=tap --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=../cli-test-results.xml \
            dist/__tests__/**/*.test.js
        continue-on-error: true

      - name: Extract failing test names (base)
        run: |
          if [ "${{ steps.resolve.outputs.valid }}" = "true" ]; then
            node scripts/ci/list-test-failures.mjs daemon daemon-test-results.xml > base-daemon-failures.txt
            node scripts/ci/list-test-failures.mjs cli cli-test-results.xml > base-cli-failures.txt
            cat base-daemon-failures.txt base-cli-failures.txt | sort -u > base-test-failures.txt
          else
            echo "::warning::No valid base ref (first push, no parent commit) — using an empty baseline; all head failures will be treated as new."
            : > base-test-failures.txt
          fi
          echo "BASE failing tests ($(wc -l < base-test-failures.txt | tr -d ' ')):"
          cat base-test-failures.txt

      - uses: actions/upload-artifact@v4
        with:
          name: base-test-failures
          path: base-test-failures.txt

  test-delta-gate:
    # The actual gate: fails the workflow iff HEAD has a failing test that
    # did not already fail on BASE. See scripts/ci/diff-test-failures.mjs.
    needs: [build-and-test, test-baseline]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: head-test-failures

      - uses: actions/download-artifact@v4
        with:
          name: base-test-failures

      - name: Compare failure sets (head vs base)
        run: node scripts/ci/diff-test-failures.mjs head-test-failures.txt base-test-failures.txt

  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files for instance-specific content
        run: |
          # Blocked patterns — instance-specific identifiers that must not
          # be introduced to the public framework repo. Keep in sync with
          # scripts/install-hooks.sh (local pre-push hook).
          #
          # NOTE: "credential-" and "BMO" are intentionally EXCLUDED from
          # this list because they're already part of the framework:
          #   - credential- is the keychain naming convention
          #   - BMO references exist in channel-router, telegram adapter, etc.
          # Cleaning those up is tracked separately.
          PATTERNS='R2D2|Skippy|bmobot|redacted@|0000000000|192\.168\.12|com\.assistant\.bmo|com\.bmo\.|redacted-vip|redacted-vip'

          # Directories/files excluded from checking (documentation, examples)
          # install-hooks.sh defines these patterns — it must contain them by definition
          EXCLUDE='README\.md|SECURITY\.md|CONTRIBUTING\.md|templates/|\.github/|\.claude/skills/|docs/|install-hooks\.sh'

          # Get changed files — PR diff or push diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # Push: compare against parent commit(s)
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # pull_request.base.sha reflects the base branch's tip at event
          # time, which may have advanced past the PR's actual fork point
          # (e.g. other PRs merged to main after this branch was cut). A
          # plain two-dot diff against that moving target would pull in
          # unrelated upstream commits as "changes" owned by this PR.
          # Resolve the true merge-base so we diff only the PR's own
          # commits — requires full history, hence fetch-depth: 0 above.
          DIFF_BASE=$(git merge-base "$BASE" "$HEAD" 2>/dev/null || echo "$BASE")

          CHANGED=$(git diff --name-only --diff-filter=ACMR "$DIFF_BASE" "$HEAD" 2>/dev/null || echo "")

          if [ -z "$CHANGED" ]; then
            echo "No changed files to check."
            exit 0
          fi

          # Filter to relevant file types and exclude safe directories
          FILES=$(echo "$CHANGED" | grep -E '\.(ts|js|yaml|yml|json|md|sh)$' | grep -v -E "$EXCLUDE" || true)

          if [ -z "$FILES" ]; then
            echo "No relevant changed files to check."
            exit 0
          fi

          echo "Checking $(echo "$FILES" | wc -l | tr -d ' ') changed files for instance-specific patterns in ADDED lines..."

          # Scan only lines this change ADDS, not the whole file. A PR is
          # accountable for what it introduces — a pre-existing occurrence
          # of a blocked pattern elsewhere in a file it happens to touch
          # must not block it. Line numbers below are the file's actual
          # line numbers (parsed from unified-diff hunk headers), not
          # positions within the added-lines stream.
          FOUND=""
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            ADDED=$(git diff -U0 "$DIFF_BASE" "$HEAD" -- "$file" | awk '
              /^@@/ {
                split($0, parts, " ");
                newpart = parts[3];
                sub(/^\+/, "", newpart);
                split(newpart, nums, ",");
                line = nums[1] + 0;
                next
              }
              /^\+\+\+/ { next }
              /^\+/ {
                print line ":" substr($0, 2);
                line++;
                next
              }
            ')
            if [ -z "$ADDED" ]; then
              continue
            fi
            MATCHES=$(echo "$ADDED" | grep -E "$PATTERNS" || true)
            if [ -n "$MATCHES" ]; then
              FOUND="${FOUND}${file}:\n${MATCHES}\n\n"
            fi
          done <<< "$FILES"

          if [ -n "$FOUND" ]; then
            echo "::error::Instance-specific content detected in lines ADDED by this change:"
            echo -e "$FOUND"
            echo ""
            echo "These patterns must not be introduced into the public framework repo."
            echo "Pre-existing occurrences elsewhere in these files do not block — only newly added lines are checked."
            echo "If this is a false positive, add the file to the EXCLUDE list in ci.yml."
            exit 1
          fi

          echo "Leak check passed — no instance-specific content in added lines."

      - name: Check changed files for real A2A group UUIDs
        run: |
          # Catches a REAL A2A network group UUID committed in ADDED lines —
          # even in docs/ and .claude/skills/, which the instance-specific
          # check above deliberately excludes (those dirs legitimately
          # mention framework names like "BMO"/"Skippy", so that check is
          # diff-scoped and directory-excluded to avoid false positives on
          # prose). A UUID has no such legitimate reason to appear in a doc
          # or skill file — it's either a placeholder or a real leaked
          # secret, never prose. So this check applies to ALL changed files,
          # no directory exclusions. See incident: real group UUID
          # c006dfce-37b6-434a-8407-1d227f485a81 sat in SKILL.md,
          # docs/api-reference.md, and a2a-router.test.ts for months because
          # the check above skips those exact paths.
          #
          # Context words that indicate "this UUID is a network group id",
          # not just any UUID (messageId/agentId examples in docs are fine).
          UUID_RE='[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
          GROUP_CTX_RE="(?i)(a2a[-_]?)?group(id)?[\"' ]{0,3}[:=,][^\n]{0,20}${UUID_RE}|target[\"' ]{0,3}[:=,][^\n]{0,20}${UUID_RE}"

          # Known-fake placeholders that must NOT trip this check — the
          # obvious all-zero placeholder used in docs/tests, and the
          # pre-existing opaque test-fixture UUID used for unrelated
          # error-path tests (payload-too-large, etc.) where the value is
          # arbitrary and never resolves to a real fleet group.
          ALLOWLIST_RE='00000000-0000-4000-8000-000000000000|00d0e9ff-8b2c-4009-a0a4-cc96af4b7827'

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          DIFF_BASE=$(git merge-base "$BASE" "$HEAD" 2>/dev/null || echo "$BASE")

          CHANGED=$(git diff --name-only --diff-filter=ACMR "$DIFF_BASE" "$HEAD" 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "No changed files to check."
            exit 0
          fi

          FOUND=""
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            ADDED=$(git diff -U0 "$DIFF_BASE" "$HEAD" -- "$file" | grep -E '^\+' | grep -v '^\+\+\+' | sed 's/^\+//')
            [ -z "$ADDED" ] && continue
            MATCHES=$(echo "$ADDED" | grep -P "$GROUP_CTX_RE" | grep -viE "$ALLOWLIST_RE" || true)
            if [ -n "$MATCHES" ]; then
              FOUND="${FOUND}${file}:\n${MATCHES}\n\n"
            fi
          done <<< "$CHANGED"

          if [ -n "$FOUND" ]; then
            echo "::error::Real-looking A2A group UUID detected in lines ADDED by this change:"
            echo -e "$FOUND"
            echo ""
            echo "A2A network group UUIDs must never be committed to this public repo."
            echo "Use an obvious placeholder instead, e.g. 00000000-0000-4000-8000-000000000000."
            exit 1
          fi

          echo "A2A group UUID check passed — no real-looking group UUIDs in added lines."

  commit-identity:
    # Guard: fail if any commit in this PR has a .local or empty author/committer
    # email. Only meaningful on pull_request — push events have no useful range.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Self-test identity check script
        run: bash scripts/test-check-commit-identity.sh

      - name: Check PR commit identities
        run: |
          bash scripts/check-commit-identity.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"
